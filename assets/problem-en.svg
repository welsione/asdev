<svg width="1200" height="470" viewBox="0 0 1200 470" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI coding failure patterns</title>
  <desc id="desc">Five failure patterns that asdev is designed to prevent.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.52" stop-color="#1B2330"/>
      <stop offset="1" stop-color="#1C1012"/>
    </linearGradient>
    <filter id="shadow" x="40" y="126" width="1120" height="250" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <style>
      .title { font: 900 38px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #F8FAFC; letter-spacing: 0; }
      .sub { font: 700 19px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #FCA5A5; letter-spacing: 0; }
      .num { font: 900 20px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0B1220; }
      .name { font: 900 20px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #F8FAFC; letter-spacing: 0; }
      .body { font: 700 14px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #FEE2E2; letter-spacing: 0; }
      .foot { font: 800 17px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #E0F2FE; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1200" height="470" rx="36" fill="url(#bg)"/>
  <text x="72" y="72" class="title">AI coding fails when it starts too soon</text>
  <text x="72" y="108" class="sub">Risk accumulates without investigation, decomposition, and acceptance.</text>
  <g filter="url(#shadow)">
    <g transform="translate(72 154)">
      <rect width="200" height="166" rx="22" fill="#1C1012" stroke="#F87171" stroke-width="2"/>
      <circle cx="38" cy="38" r="18" fill="#F87171"/>
      <text x="31" y="45" class="num">1</text>
      <text x="28" y="84" class="name">Self-review</text>
      <text x="28" y="116" class="body">The maker grades</text>
      <text x="28" y="140" class="body">its own work</text>
    </g>
    <g transform="translate(288 154)">
      <rect width="200" height="166" rx="22" fill="#1C1012" stroke="#FB7185" stroke-width="2"/>
      <circle cx="38" cy="38" r="18" fill="#FB7185"/>
      <text x="31" y="45" class="num">2</text>
      <text x="28" y="84" class="name">Big-bang risk</text>
      <text x="28" y="116" class="body">Wrong direction</text>
      <text x="28" y="140" class="body">discovered late</text>
    </g>
    <g transform="translate(504 154)">
      <rect width="200" height="166" rx="22" fill="#1C1012" stroke="#F59E0B" stroke-width="2"/>
      <circle cx="38" cy="38" r="18" fill="#F59E0B"/>
      <text x="31" y="45" class="num">3</text>
      <text x="28" y="84" class="name">Comprehension</text>
      <text x="28" y="116" class="body">The faster it ships,</text>
      <text x="28" y="140" class="body">the less you know</text>
    </g>
    <g transform="translate(720 154)">
      <rect width="200" height="166" rx="22" fill="#1C1012" stroke="#FCA5A5" stroke-width="2"/>
      <circle cx="38" cy="38" r="18" fill="#FCA5A5"/>
      <text x="31" y="45" class="num">4</text>
      <text x="28" y="84" class="name">Goal amnesia</text>
      <text x="28" y="116" class="body">Each session starts</text>
      <text x="28" y="140" class="body">from zero again</text>
    </g>
    <g transform="translate(936 154)">
      <rect width="192" height="166" rx="22" fill="#1C1012" stroke="#FDE68A" stroke-width="2"/>
      <circle cx="38" cy="38" r="18" fill="#FDE68A"/>
      <text x="31" y="45" class="num">5</text>
      <text x="28" y="84" class="name">Vague criteria</text>
      <text x="28" y="116" class="body">"Looks fine"</text>
      <text x="28" y="140" class="body">is not evidence</text>
    </g>
  </g>
  <rect x="72" y="376" width="1056" height="50" rx="25" fill="#0B1220" fill-opacity="0.66" stroke="#FCA5A5" stroke-opacity="0.3"/>
  <text x="104" y="408" class="foot">asdev breaks one large risk into smaller risks that can be found, corrected, and accepted.</text>
</svg>
